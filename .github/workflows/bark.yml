name: Bark

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # Zola 构建与 Pages 部署（仅限 push 到 main）
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@latest

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Zola
        run: |
          zola build \
            --minify \
            --base-url "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # 更新 Bark 管理界面（仅限手动触发）
  update-admin:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download latest Bark release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download \
            --repo jel1yspot/bark \
            --pattern "dist.zip" \
            --output dist.zip

      - name: Install to static/admin
        run: |
          rm -rf static/admin
          mkdir -p static/admin
          unzip -o dist.zip -d static/admin
          rm dist.zip

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/admin/
          if git diff --staged --quiet; then
            echo "Bark is already up to date."
          else
            git commit -m "Update Bark"
            git push
          fi
