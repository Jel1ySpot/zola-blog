name: Install / Update Bark

on:
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  update-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download latest Bark release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download \
            --repo jel1yspot/bark \
            --pattern "dist.zip" \
            --output dist.zip

      - name: Install to static/admin
        run: |
          rm -rf static/admin
          mkdir -p static/admin
          unzip -o dist.zip -d static/admin
          rm dist.zip

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/admin/
          if git diff --staged --quiet; then
            echo "Bark is already up to date."
          else
            git commit -m "Update Bark"
            git push
          fi
